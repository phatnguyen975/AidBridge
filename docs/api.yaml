openapi: 3.0.3
info:
  title: AidBridge API
  description: |
    AidBridge - Disaster Relief Coordinator API

    ## Overview
    RESTful API for coordinating disaster relief operations including:
    - SOS rescue requests
    - Aid supply requests and delivery
    - Volunteer mission management
    - Hub inventory management
    - Sponsor donations

    ## Authentication
    All protected endpoints require Bearer token in Authorization header.

    ## Database Version
    This API is aligned with database schema v4.0

    ## Caching Strategy

    The API uses Redis for caching frequently accessed data. Cache behavior is documented
    per-endpoint. General principles:

    ### Cache Patterns
    | Pattern | TTL | Use Case |
    |---------|-----|----------|
    | `mission:active:{id}` | 5m | Single active mission details |
    | `mission:active:list:{hash}` | 2m | Active missions list with filters |
    | `mission:stats:{scope}:{range}` | 5m | Aggregated statistics |
    | `user:{id}:active_missions` | 2m | User's active missions |

    ### Cache Invalidation
    - Write operations (POST/PUT/DELETE) invalidate relevant cache entries
    - Status changes trigger broadcast invalidation via Redis pub/sub
    - Clients should respect `cached_at` timestamps for cache-aware UX

    ### Endpoints NOT Cached
    - Audit trails (dispatch attempts, inventory logs)
    - Real-time data (tracking, chat)
    - Write operations
    - Paginated history queries

  version: 1.0.0
  contact:
    name: AidBridge Team

servers:
  - url: http://localhost:8080/api
    description: Local development
  - url: https://api.aidbridge.com/v1
    description: Production
  - url: https://staging-api.aidbridge.com/v1
    description: Staging

tags:
  - name: Auth
    description: Authentication and user management
  - name: SOS Requests
    description: Emergency rescue requests
  - name: Aid Requests
    description: Supply aid requests
  - name: Missions
    description: Volunteer missions
  - name: Volunteers
    description: Volunteer management
  - name: Sponsors
    description: Sponsor management
  - name: Donations
    description: Donation management
  - name: Hubs
    description: Distribution hub management
  - name: Inventory
    description: Hub inventory operations
  - name: Shelters
    description: Emergency shelter management
  - name: Categories
    description: Item categories
  - name: Chat
    description: Mission chat
  - name: Ratings
    description: Mission ratings
  - name: Notifications
    description: User notifications
  - name: Map
    description: Map and location services
  - name: Admin
    description: Admin operations
  - name: AI
    description: AI-powered services

# ============================================================
# SECURITY SCHEMES
# ============================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  # ============================================================
  # ENUMS - Matching database schema v4.0 exactly
  # ============================================================
  schemas:
    # ---------- ENUM: user_role ----------
    UserRole:
      type: string
      enum: [VICTIM, VOLUNTEER, SPONSOR, STAFF, ADMIN]
      description: User role in the system

    # ---------- ENUM: hub_status ----------
    HubStatus:
      type: string
      enum: [ACTIVE, INACTIVE, EMERGENCY]
      description: Hub operational status

    # ---------- ENUM: urgency_level ----------
    UrgencyLevel:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW]
      description: Request urgency level

    # ---------- ENUM: sos_status ----------
    SosStatus:
      type: string
      enum: [PENDING, DISPATCHING, ASSIGNED, IN_PROGRESS, COMPLETED, CANCELLED]
      description: SOS request status

    # ---------- ENUM: aid_status ----------
    AidStatus:
      type: string
      enum: [PENDING, DISPATCHING, ASSIGNED, PICKED_UP, IN_TRANSIT, COMPLETED, CANCELLED]
      description: Aid request status

    # ---------- ENUM: donation_status ----------
    DonationStatus:
      type: string
      enum: [REGISTERED, QR_GENERATED, RECEIVED, REJECTED]
      description: Donation status

    # ---------- ENUM: mission_type ----------
    MissionType:
      type: string
      enum: [RESCUE, DELIVERY]
      description: Type of mission

    # ---------- ENUM: mission_status ----------
    MissionStatus:
      type: string
      enum: [PENDING, DISPATCHING, ASSIGNED, PICKING_UP, PICKED_UP, IN_TRANSIT, COMPLETED, CANCELLED]
      description: Mission status

    # ---------- ENUM: dispatch_response ----------
    DispatchResponse:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED, TIMEOUT]
      description: Volunteer response to dispatch

    # ---------- ENUM: badge_level ----------
    BadgeLevel:
      type: string
      enum: [BRONZE, SILVER, GOLD, PLATINUM]
      description: Sponsor badge level

    # ---------- ENUM: otp_type ----------
    OtpType:
      type: string
      enum: [EMAIL_VERIFY, PHONE_VERIFY, PASSWORD_RESET]
      description: OTP purpose type

    # ---------- ENUM: shelter_status ----------
    ShelterStatus:
      type: string
      enum: [AVAILABLE, FULL, UNAVAILABLE]
      description: Shelter availability status

    # ---------- ENUM: inventory_change ----------
    InventoryChangeType:
      type: string
      enum: [INBOUND, OUTBOUND]
      description: Inventory change direction

    # ---------- ENUM: inventory_ref_type ----------
    InventoryRefType:
      type: string
      enum: [DONATION, MISSION]
      description: Inventory log reference type

    # ---------- ENUM: dispatch_type ----------
    DispatchType:
      type: string
      enum: [BROADCAST, SEQUENTIAL]
      description: Dispatch strategy type

    # ---------- ENUM: message_type ----------
    MessageType:
      type: string
      enum: [TEXT, IMAGE]
      description: Chat message type

    # ---------- ENUM: notification_type ----------
    NotificationType:
      type: string
      enum: [MISSION, SOS, DONATION, AID_REQUEST, SYSTEM]
      description: Notification category

    # ---------- ENUM: vehicle_type ----------
    VehicleType:
      type: string
      enum: [MOTORBIKE, CAR, TRUCK, BICYCLE, WALK]
      description: Volunteer vehicle type

    # ============================================================
    # COMMON SCHEMAS
    # ============================================================
    Location:
      type: object
      description: Geographic coordinates
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 10.762622
        lng:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 106.660172

    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total:
          type: integer
          example: 150
        total_pages:
          type: integer
          example: 8

    Error:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Invalid input data
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    # ============================================================
    # AUTH SCHEMAS - Matching users table
    # ============================================================
    RegisterRequest:
      type: object
      required: [full_name, password, role]
      properties:
        full_name:
          type: string
          maxLength: 100
          example: Nguyen Van A
        email:
          type: string
          format: email
          maxLength: 255
          example: user@example.com
        phone_number:
          type: string
          maxLength: 20
          example: "+84901234567"
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        role:
          $ref: '#/components/schemas/UserRole'
        avatar_url:
          type: string
          format: uri
          maxLength: 500
    LoginRequest:
      type: object
      required: [password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        phone_number:
          type: string
          example: "+84901234567"
        password:
          type: string
          format: password
          example: SecurePass123

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
              description: Token expiry in seconds
              example: 3600
            user:
              $ref: '#/components/schemas/UserProfile'

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    # ---------- User Profile (from users table) ----------
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone_number:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        is_verified:
          type: boolean
        is_active:
          type: boolean
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 100
        avatar_url:
          type: string
          format: uri
          maxLength: 500
        fcm_token:
          type: string
          maxLength: 500

    # ---------- OTP Schemas ----------
    RequestOtpRequest:
      type: object
      required: [otp_type]
      properties:
        email:
          type: string
          format: email
        phone_number:
          type: string
        otp_type:
          $ref: '#/components/schemas/OtpType'

    VerifyOtpRequest:
      type: object
      required: [otp_code, otp_type]
      properties:
        email:
          type: string
          format: email
        phone_number:
          type: string
        otp_code:
          type: string
          pattern: '^\d{6}$'
          example: "123456"
        otp_type:
          $ref: '#/components/schemas/OtpType'

    ResetPasswordRequest:
      type: object
      required: [otp_code, new_password]
      properties:
        email:
          type: string
          format: email
        phone_number:
          type: string
        otp_code:
          type: string
          pattern: '^\d{6}$'
        new_password:
          type: string
          format: password
          minLength: 8

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 8

    # ============================================================
    # SOS REQUESTS - Matching sos_requests table
    # ============================================================
    CreateSosRequest:
      type: object
      required: [requester_name, requester_phone, victim_lat, victim_lng, people_count]
      properties:
        requester_name:
          type: string
          maxLength: 100
          example: Nguyen Van A
        requester_phone:
          type: string
          maxLength: 20
          example: "+84901234567"
        victim_name:
          type: string
          maxLength: 100
          description: Name of person needing rescue (if different from requester)
        victim_phone:
          type: string
          maxLength: 20
        victim_lat:
          type: number
          format: double
          example: 10.762622
        victim_lng:
          type: number
          format: double
          example: 106.660172
        victim_address:
          type: string
          example: 123 Nguyen Hue, District 1, HCMC
        description:
          type: string
          example: Flooding, need immediate rescue
        people_count:
          type: integer
          minimum: 1
          example: 3
        is_on_behalf:
          type: boolean
          default: false
          description: True if requesting for someone else
        urgency_level:
          $ref: '#/components/schemas/UrgencyLevel'
        image_url:
          type: string
          format: uri
          maxLength: 500

    SosRequestResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/SosRequest'

    SosRequest:
      type: object
      description: SOS request entity matching sos_requests table
      properties:
        id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
          nullable: true
          description: NULL for guest requests
        requester_name:
          type: string
        requester_phone:
          type: string
        victim_name:
          type: string
          nullable: true
        victim_phone:
          type: string
          nullable: true
        victim_lat:
          type: number
          format: double
        victim_lng:
          type: number
          format: double
        victim_address:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        people_count:
          type: integer
        is_on_behalf:
          type: boolean
        urgency_level:
          $ref: '#/components/schemas/UrgencyLevel'
        ai_summary:
          type: string
          nullable: true
          description: AI-generated summary
        status:
          $ref: '#/components/schemas/SosStatus'
        image_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SosRequestListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/SosRequest'
            pagination:
              $ref: '#/components/schemas/Pagination'

    # ============================================================
    # AID REQUESTS - Matching aid_requests + aid_request_items
    # ============================================================
    CreateAidRequest:
      type: object
      required: [lat, lng, items]
      properties:
        sos_request_id:
          type: string
          format: uuid
          description: Link to SOS request if applicable
        lat:
          type: number
          format: double
          example: 10.762622
        lng:
          type: number
          format: double
          example: 106.660172
        address:
          type: string
        adults_count:
          type: integer
          minimum: 0
          default: 0
        elderly_count:
          type: integer
          minimum: 0
          default: 0
        children_count:
          type: integer
          minimum: 0
          default: 0
        notes:
          type: string
        urgency_level:
          $ref: '#/components/schemas/UrgencyLevel'
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AidRequestItemInput'

    AidRequestItemInput:
      type: object
      required: [item_category_id, quantity]
      properties:
        item_category_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    AidRequestResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/AidRequest'

    AidRequest:
      type: object
      description: Aid request entity matching aid_requests table
      properties:
        id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
        sos_request_id:
          type: string
          format: uuid
          nullable: true
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        address:
          type: string
          nullable: true
        adults_count:
          type: integer
        elderly_count:
          type: integer
        children_count:
          type: integer
        notes:
          type: string
          nullable: true
        urgency_level:
          $ref: '#/components/schemas/UrgencyLevel'
        status:
          $ref: '#/components/schemas/AidStatus'
        items:
          type: array
          items:
            $ref: '#/components/schemas/AidRequestItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AidRequestItem:
      type: object
      description: Aid request line item matching aid_request_items table
      properties:
        id:
          type: string
          format: uuid
        aid_request_id:
          type: string
          format: uuid
        item_category_id:
          type: string
          format: uuid
        quantity:
          type: integer
        # Joined from item_categories
        category_name:
          type: string
        category_name_vi:
          type: string
        unit:
          type: string
        created_at:
          type: string
          format: date-time

    AidRequestListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AidRequest'
            pagination:
              $ref: '#/components/schemas/Pagination'

    # ============================================================
    # MISSIONS - Matching missions + mission_items tables
    # ============================================================
    Mission:
      type: object
      description: Mission entity matching missions table
      properties:
        id:
          type: string
          format: uuid
        mission_type:
          $ref: '#/components/schemas/MissionType'
        sos_request_id:
          type: string
          format: uuid
          nullable: true
          description: For RESCUE missions
        aid_request_id:
          type: string
          format: uuid
          nullable: true
          description: For DELIVERY missions
        volunteer_id:
          type: string
          format: uuid
          nullable: true
        hub_id:
          type: string
          format: uuid
          nullable: true
          description: For DELIVERY missions
        status:
          $ref: '#/components/schemas/MissionStatus'
        qr_code_token:
          type: string
          nullable: true
        priority_score:
          type: number
          format: double
          nullable: true
        version:
          type: integer
          description: Optimistic locking version
        accepted_at:
          type: string
          format: date-time
          nullable: true
        picked_up_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
          nullable: true
        confirmation_image_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MissionItem:
      type: object
      description: Mission line item matching mission_items table
      properties:
        id:
          type: string
          format: uuid
        mission_id:
          type: string
          format: uuid
        item_category_id:
          type: string
          format: uuid
        quantity:
          type: integer
        category_name:
          type: string
        category_name_vi:
          type: string
        unit:
          type: string
        created_at:
          type: string
          format: date-time

    MissionListResponse:
      type: object
      description: |
        Response for list missions endpoint.
        Cache: Not cached - data changes frequently with real-time status updates.
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "Missions retrieved successfully"
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Mission'
            pagination:
              $ref: '#/components/schemas/Pagination'

    MissionDetailResponse:
      type: object
      description: |
        Response for single mission detail.
        Cache Strategy (Redis):
          - Key: mission:{id}
          - TTL: 5 minutes for active missions (status IN ['ASSIGNED', 'PICKING_UP', 'PICKED_UP', 'IN_TRANSIT'])
          - No cache for completed/cancelled missions
          - Invalidate on: status change, volunteer assignment, pickup/complete/cancel actions
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "Mission retrieved successfully"
        data:
          allOf:
            - $ref: '#/components/schemas/Mission'
            - type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/MissionItem'
                volunteer:
                  $ref: '#/components/schemas/VolunteerBrief'
                hub:
                  $ref: '#/components/schemas/HubBrief'
                sos_request:
                  $ref: '#/components/schemas/SosRequest'
                aid_request:
                  $ref: '#/components/schemas/AidRequest'

    MissionPickupResponse:
      type: object
      description: |
        Response for pickup confirmation.
        Cache: Invalidates mission:{id} cache after successful pickup.
        Triggers: Supabase Realtime status update + FCM notification to victim.
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "Pickup confirmed successfully"
        data:
          allOf:
            - $ref: '#/components/schemas/Mission'
            - type: object
              properties:
                picked_up_at:
                  type: string
                  format: date-time
                qr_verified:
                  type: boolean
                  description: Whether pickup was verified via QR code

    MissionCompleteResponse:
      type: object
      description: |
        Response for mission completion.
        Cache: Removes mission:{id} from active cache.
        Triggers:
          - Supabase Realtime status update
          - FCM notification to victim
          - Update volunteer stats in PostgreSQL
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "Mission completed successfully"
        data:
          allOf:
            - $ref: '#/components/schemas/Mission'
            - type: object
              properties:
                completed_at:
                  type: string
                  format: date-time
                confirmation_image_url:
                  type: string
                  description: URL of uploaded confirmation image
                volunteer_stats:
                  type: object
                  properties:
                    total_missions_completed:
                      type: integer
                    points_earned:
                      type: integer

    MissionCancelResponse:
      type: object
      description: |
        Response for mission cancellation.
        Cache: Removes mission:{id} from active cache.
        Triggers:
          - Supabase Realtime status update
          - FCM notification to relevant parties
          - Re-dispatch if victim still needs help (for RESCUE missions)
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "Mission cancelled"
        data:
          allOf:
            - $ref: '#/components/schemas/Mission'
            - type: object
              properties:
                cancelled_at:
                  type: string
                  format: date-time
                cancellation_reason:
                  type: string
                will_redispatch:
                  type: boolean
                  description: Whether system will attempt to find another volunteer

    MissionTrackingResponse:
      type: object
      description: |
        Response for mission tracking endpoint.
        Cache Strategy (Redis):
          - Volunteer location: from Redis geo data (volunteer:locations)
          - Real-time updates via Supabase Realtime WebSocket
          - ETA calculated from cached route data
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "Tracking info retrieved"
        data:
          type: object
          properties:
            mission_id:
              type: string
              format: uuid
            status:
              $ref: '#/components/schemas/MissionStatus'
            volunteer:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                full_name:
                  type: string
                avatar_url:
                  type: string
                current_lat:
                  type: number
                current_lng:
                  type: number
                last_updated:
                  type: string
                  format: date-time
            destination:
              $ref: '#/components/schemas/Location'
            destination_address:
              type: string
            eta_minutes:
              type: integer
              description: Estimated time of arrival in minutes
            distance_km:
              type: number
              description: Remaining distance in kilometers
            websocket_channel:
              type: string
              description: Supabase Realtime channel for live updates

    CreateMissionRequest:
      type: object
      required: [mission_type]
      description: |
        Create a new mission. For RESCUE missions, sos_request_id is required.
        For DELIVERY missions, aid_request_id and hub_id are required.
      properties:
        mission_type:
          $ref: '#/components/schemas/MissionType'
        sos_request_id:
          type: string
          format: uuid
          description: Required for RESCUE missions
        aid_request_id:
          type: string
          format: uuid
          description: Required for DELIVERY missions
        hub_id:
          type: string
          format: uuid
          description: Required for DELIVERY missions
        volunteer_id:
          type: string
          format: uuid
          description: Optional - pre-assign to a specific volunteer
        priority_score:
          type: number
          format: double
          description: Higher score = higher priority
          minimum: 0
          maximum: 100

    AcceptMissionRequest:
      type: object
      properties:
        dispatch_attempt_id:
          type: string
          format: uuid
          description: The dispatch attempt being responded to
        current_lat:
          type: number
          format: double
          description: Volunteer's current latitude
