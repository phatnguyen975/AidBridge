                  type: integer
                by_type:
                  type: object
                  properties:
                    rescue:
                      type: integer
                    delivery:
                      type: integer
                by_status:
                  type: object
                  additionalProperties:
                    type: integer
            cached_at:
              type: string
              format: date-time
              description: Timestamp when data was cached

    MissionStatsResponse:
      type: object
      description: |
        Mission statistics. Cached in Redis for 5 minutes.
        Cache key: mission:stats:{hub_id|all}:{date_range}
