              items:
                $ref: '#/components/schemas/Mission'
            pending:
              type: array
              description: Pending dispatch requests waiting for response
              items:
                type: object
                properties:
                  dispatch_attempt:
                    $ref: '#/components/schemas/DispatchAttempt'
