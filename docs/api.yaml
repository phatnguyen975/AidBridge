        current_capacity:
          type: integer
        status:
          $ref: '#/components/schemas/ShelterStatus'

    ShelterResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Shelter'

    ShelterListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/Shelter'
                  - type: object
                    properties:
                      available_spots:
                        type: integer
                      distance_km:
                        type: number

    # ============================================================
    # ITEM CATEGORIES - Matching item_categories table
    # ============================================================
    ItemCategory:
      type: object
      description: Item category matching item_categories table
      properties:
        id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        name_vi:
          type: string
        unit:
          type: string
        is_leaf:
          type: boolean
        created_at:
          type: string
          format: date-time
        children:
          type: array
          items:
            $ref: '#/components/schemas/ItemCategory'

    CategoryListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ItemCategory'

    CategoryDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          allOf:
            - $ref: '#/components/schemas/ItemCategory'
            - type: object
              properties:
                parent:
                  $ref: '#/components/schemas/ItemCategory'

    # ============================================================
    # CHAT - Matching chat_messages table
    # ============================================================
    ChatMessage:
      type: object
      description: Chat message matching chat_messages table
      properties:
        id:
          type: string
          format: uuid
        mission_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        message_type:
          $ref: '#/components/schemas/MessageType'
        message_text:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
        sender_name:
          type: string
        sender_role:
          $ref: '#/components/schemas/UserRole'

    SendChatMessageRequest:
      type: object
      required: [message_type]
      properties:
        message_type:
          $ref: '#/components/schemas/MessageType'
        message_text:
          type: string
        image_url:
          type: string
          format: uri

    ChatMessageResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ChatMessage'

    ChatMessageListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessage'
            pagination:
              $ref: '#/components/schemas/Pagination'

    # ============================================================
    # RATINGS - Matching ratings table
    # ============================================================
    Rating:
      type: object
      description: Rating matching ratings table
      properties:
        id:
          type: string
          format: uuid
        mission_id:
          type: string
          format: uuid
        rater_id:
          type: string
          format: uuid
        ratee_id:
          type: string
          format: uuid
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateRatingRequest:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    RatingResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Rating'

    VolunteerRatingsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            volunteer_id:
              type: string
              format: uuid
            avg_rating:
              type: number
            total_ratings:
              type: integer
            distribution:
              type: object
              additionalProperties:
                type: integer
            items:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/Rating'
                  - type: object
                    properties:
                      mission_type:
                        $ref: '#/components/schemas/MissionType'
            pagination:
              $ref: '#/components/schemas/Pagination'

    # ============================================================
    # NOTIFICATIONS - Matching notifications table
    # ============================================================
    Notification:
      type: object
      description: Notification matching notifications table
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        body:
          type: string
          nullable: true
        related_type:
          $ref: '#/components/schemas/NotificationType'
        related_id:
          type: string
          format: uuid
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    NotificationListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Notification'
            unread_count:
              type: integer
            pagination:
              $ref: '#/components/schemas/Pagination'

    BroadcastNotificationRequest:
      type: object
      required: [title, body, target]
      properties:
        title:
          type: string
          maxLength: 200
        body:
          type: string
        target:
          type: object
          required: [type]
          properties:
            type:
              type: string
              enum: [ALL, ROLE, AREA]
            roles:
              type: array
              items:
                $ref: '#/components/schemas/UserRole'
            area:
              type: object
              properties:
                lat:
                  type: number
                lng:
                  type: number
                radius_km:
                  type: number

    BroadcastResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            notification_id:
              type: string
              format: uuid
            recipients_count:
              type: integer
            message:
              type: string

    # ============================================================
    # MAP & DIRECTIONS
    # ============================================================
    MapLayersResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            hubs:
              type: array
              items:
                $ref: '#/components/schemas/HubBrief'
            shelters:
              type: array
              items:
                $ref: '#/components/schemas/Shelter'
            requests:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum: [SOS, AID]
                  id:
                    type: string
                    format: uuid
                  lat:
                    type: number
                  lng:
                    type: number
                  urgency_level:
                    $ref: '#/components/schemas/UrgencyLevel'
            last_updated:
              type: string
              format: date-time

    DirectionsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            polyline:
              type: string
              description: Encoded polyline string
            distance_km:
              type: number
            duration_minutes:
              type: integer
            steps:
              type: array
              items:
                type: object
                properties:
                  instruction:
                    type: string
                  distance_m:
                    type: integer

    # ============================================================
    # ADMIN STAFF - Matching users(role=STAFF) + hub_staff
    # ============================================================
    AdminStaff:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        hubId:
          type: string
          format: uuid
        hubName:
          type: string

    CreateAdminStaffRequest:
      type: object
      required: [fullName, email, phoneNumber, password, hubId]
      properties:
        fullName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          maxLength: 15
        password:
          type: string
          minLength: 8
          format: password
        hubId:
          type: string
          format: uuid

    AdminStaffListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/AdminStaff'

    AdminStaffResponseWrapper:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/AdminStaff'

    # ============================================================
    # SYSTEM CONFIG - Matching system_config table
    # ============================================================
    SystemConfig:
      type: object
      description: System config matching system_config table
      properties:
        key:
          type: string
          maxLength: 100
        value:
          type: string
        description:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    SystemConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/SystemConfig'

    UpdateSystemConfigRequest:
      type: object
      required: [configs]
      properties:
        configs:
          type: array
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
              value:
                type: string

    UpdateSystemConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            updated:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  old_value:
                    type: string
                  new_value:
                    type: string

    # ============================================================
    # AI SERVICES
    # ============================================================
    AiSummaryResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            period:
              type: string
            summary:
              type: object
              properties:
                total_requests:
                  type: integer
                sos_requests:
                  type: integer
                aid_requests:
                  type: integer
                completed_missions:
                  type: integer
                active_volunteers:
                  type: integer
                people_helped:
                  type: integer
            hub_alerts:
              type: array
              items:
                type: object
                properties:
                  hub_id:
                    type: string
                    format: uuid
                  hub_name:
                    type: string
                  alert_type:
                    type: string
                  message:
                    type: string
            generated_at:
              type: string
              format: date-time

    AiChatResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            response:
              type: string
            data_sources:
              type: array
              items:
                type: string
            generated_at:
              type: string
              format: date-time

    ExportReportRequest:
      type: object
      required: [period, format]
      properties:
        period:
          type: string
          enum: [today, week, month]
        format:
          type: string
          enum: [PDF, CSV, EXCEL]
        sections:
          type: array
          items:
            type: string
            enum: [summary, missions, inventory, volunteers]

    ExportReportResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            job_id:
              type: string
              format: uuid
            status:
              type: string
              enum: [PROCESSING, COMPLETED, FAILED]
            download_url:
              type: string
            expires_at:
              type: string
              format: date-time

    # ============================================================
    # ATTACHMENTS
    # ============================================================
    AttachmentResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            url:
              type: string
            file_name:
              type: string
            file_size:
              type: integer
            mime_type:
              type: string
            uploaded_by:
              type: string
              format: uuid
            created_at:
              type: string
              format: date-time

# ============================================================
# PATHS - Part 1: Auth
# ============================================================
paths:
  # ---------- AUTH ENDPOINTS ----------
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke tokens
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP code
      operationId: requestOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOtpRequest'
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '429':
          description: Too many OTP requests (rate limited)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password/otp/resend:
    post:
      tags: [Auth]
      summary: Resend OTP for password reset
      operationId: resendPasswordOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestOtpRequest'
      responses:
        '200':
          description: Password reset OTP resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Email not registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many OTP requests (rate limited)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP code
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Account locked due to too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password with OTP
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid OTP or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password/change:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ---------- USER PROFILE ----------
  /users/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'

    patch:
      tags: [Auth]
      summary: Update current user profile
      operationId: updateMe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'

  # ============================================================
  # SOS REQUESTS
  # ============================================================
  /sos-requests:
    post:
      tags: [SOS Requests]
      summary: Create SOS rescue request (allows guest)
      operationId: createSosRequest
      description: Creates emergency rescue request. Authentication optional for guests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSosRequest'
      responses:
        '201':
          description: SOS request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SosRequestResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [SOS Requests]
      summary: List SOS requests
      operationId: listSosRequests
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SosStatus'
        - name: urgency_level
          in: query
          schema:
            $ref: '#/components/schemas/UrgencyLevel'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: SOS requests list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SosRequestListResponse'

  /sos-requests/{id}:
    get:
      tags: [SOS Requests]
      summary: Get SOS request details
      operationId: getSosRequest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SOS request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SosRequestResponse'
        '404':
          description: SOS request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sos-requests/{id}/cancel:
    post:
      tags: [SOS Requests]
      summary: Cancel SOS request
      operationId: cancelSosRequest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: SOS request cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SosRequestResponse'

  # ============================================================
  # AID REQUESTS
  # ============================================================
  /aid-requests:
    post:
      tags: [Aid Requests]
      summary: Create aid supply request
      operationId: createAidRequest
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAidRequest'
      responses:
        '201':
          description: Aid request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AidRequestResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Aid Requests]
      summary: List aid requests
      operationId: listAidRequests
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AidStatus'
        - name: urgency_level
          in: query
          schema:
            $ref: '#/components/schemas/UrgencyLevel'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Aid requests list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AidRequestListResponse'

  /aid-requests/{id}:
    get:
      tags: [Aid Requests]
      summary: Get aid request details
      operationId: getAidRequest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Aid request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AidRequestResponse'
        '404':
          description: Aid request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /aid-requests/{id}/cancel:
    post:
      tags: [Aid Requests]
      summary: Cancel aid request
      operationId: cancelAidRequest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Aid request cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AidRequestResponse'

  /aid-requests/voice:
    post:
      tags: [Aid Requests]
      summary: Create aid request via voice (AI transcription)
      operationId: createVoiceAidRequest
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                lat:
                  type: number
                lng:
                  type: number
      responses:
        '200':
          description: Voice transcribed and aid request suggested
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      transcription:
                        type: string
                      suggested_request:
                        $ref: '#/components/schemas/CreateAidRequest'
                      requires_confirmation:
                        type: boolean

  # ============================================================
  # MISSIONS
  # ============================================================
  /missions:
    get:
      tags: [Missions]
      summary: List missions
      description: |
        Get a paginated list of missions with optional filters.

        **Cache Strategy:**
        - Not cached - mission list data changes frequently
        - For real-time updates, subscribe to Supabase Realtime channel `missions`
        - Filter by status to reduce response size

        **Access Control:**
        - VOLUNTEER: Can only see their assigned missions
        - STAFF/ADMIN: Can see all missions (optionally filter by hub)
      operationId: listMissions
      security:
        - BearerAuth: []
      parameters:
        - name: mission_type
          in: query
          description: Filter by mission type (RESCUE or DELIVERY)
          schema:
            $ref: '#/components/schemas/MissionType'
        - name: status
          in: query
          description: Filter by mission status
          schema:
            $ref: '#/components/schemas/MissionStatus'
        - name: volunteer_id
          in: query
          description: Filter by assigned volunteer (Staff/Admin only)
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Missions list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Missions]
      summary: Create a new mission (Staff/Admin only)
      description: |
        Create a new mission from an SOS request or Aid request.
        This will trigger the dispatch process to find available volunteers.

        **No Cache** - Write operation

        **Side Effects:**
        - Creates dispatch_attempts for nearby volunteers
        - Triggers FCM push notifications (high priority)
        - Adds to Redis dispatch queue
        - Updates SOS/Aid request status to DISPATCHING
      operationId: createMission
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMissionRequest'
      responses:
        '201':
          description: Mission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionDetailResponse'
        '400':
          description: Invalid request (e.g., SOS request already has mission)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Referenced SOS/Aid request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}:
    get:
      tags: [Missions]
      summary: Get mission details
      description: |
        Get detailed information about a specific mission.

        **Cache Strategy:**
        - Active missions (non-terminal status): Cached in Redis `mission:active:{id}` (TTL: 5 minutes)
        - Completed/Cancelled missions: Not cached (fetch from PostgreSQL)
        - Cache invalidated on status change
      operationId: getMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Mission details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionDetailResponse'
        '404':
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/pickup:
    post:
      tags: [Missions]
      summary: Confirm pickup at hub (DELIVERY mission)
      description: |
        Volunteer confirms picking up items at the hub for a DELIVERY mission.
        QR code verification is optional but recommended.

        **Cache Strategy:**
        - Invalidates: `mission:{id}` cache in Redis
        - Updates mission status to PICKED_UP

        **Side Effects:**
        - Broadcasts status update via Supabase Realtime
        - Sends FCM notification to victim (high priority)
        - Updates hub inventory (decrements reserved items)
      operationId: confirmMissionPickup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                qr_code_token:
                  type: string
                  description: QR code scanned at hub for verification
      responses:
        '200':
          description: Pickup confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionPickupResponse'
        '400':
          description: Invalid mission state (not in ASSIGNED status) or invalid QR code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/complete:
    post:
      tags: [Missions]
      summary: Complete mission with confirmation
      description: |
        Volunteer marks the mission as completed with a confirmation image.
        Required for both RESCUE and DELIVERY missions.

        **Cache Strategy:**
        - Removes: `mission:{id}` from active cache in Redis
        - Mission moves to completed state (no longer cached)

        **Side Effects:**
        - Uploads confirmation image to Cloud Storage
        - Broadcasts status update via Supabase Realtime
        - Sends FCM notification to victim
        - Updates volunteer stats (total_tasks_completed, points)
        - Updates SOS/Aid request status to RESOLVED
      operationId: completeMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [confirmation_image]
              properties:
                confirmation_image:
                  type: string
                  format: binary
                  description: Photo proof of delivery/rescue completion
                notes:
                  type: string
                  description: Optional notes about the completion
      responses:
        '200':
          description: Mission completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionCompleteResponse'
        '400':
          description: Invalid mission state or missing confirmation image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/cancel:
    post:
      tags: [Missions]
      summary: Cancel mission
      description: |
        Cancel an active mission. Can be initiated by volunteer or staff.

        **Cache Strategy:**
        - Removes: `mission:{id}` from active cache in Redis
        - Mission moves to cancelled state (no longer cached)

        **Side Effects:**
        - Broadcasts status update via Supabase Realtime
        - Sends FCM notification to victim
        - For RESCUE missions: triggers re-dispatch if sos_request still active
        - Returns reserved inventory to hub (for DELIVERY missions)
      operationId: cancelMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancellation_reason]
              properties:
                cancellation_reason:
                  type: string
                  description: Reason for cancellation
                  example: "Vehicle breakdown"
      responses:
        '200':
          description: Mission cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionCancelResponse'
        '400':
          description: Invalid mission state (already completed or cancelled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/tracking:
    get:
      tags: [Missions]
      summary: Get real-time tracking info
      description: |
        Get current tracking information for an active mission including
        volunteer's live location, ETA, and distance remaining.

        **Cache Strategy:**
        - Volunteer location: Read from Redis `volunteer:locations` (geo data)
        - Location updates every 10 seconds via mobile app
        - ETA/distance calculated from cached route data (TTL: 30 seconds)

        **Real-time Updates:**
        - Subscribe to Supabase Realtime channel `missions:{id}` for live updates
        - Returns websocket_channel URL for client subscription
      operationId: getMissionTracking
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tracking information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionTrackingResponse'
        '400':
          description: Mission is not in trackable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/chat:
    get:
      tags: [Chat]
      summary: Get mission chat messages
      operationId: getMissionChat
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Chat messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageListResponse'

    post:
      tags: [Chat]
      summary: Send chat message
      operationId: sendChatMessage
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendChatMessageRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'

  /missions/{id}/rating:
    post:
      tags: [Ratings]
      summary: Rate completed mission
      operationId: rateMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRatingRequest'
      responses:
        '201':
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          description: Mission not completed or already rated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ---------- Additional Mission Endpoints ----------
  /missions/my:
    get:
      tags: [Missions]
      summary: Get my missions (volunteer)
      description: |
        Get current volunteer's missions including active, pending dispatch requests, and history.

        **Cache Strategy:**
        - Active missions: Cached in Redis `user:{user_id}:active_missions` (TTL: 2 minutes)
        - Pending dispatches: Not cached (real-time from Redis dispatch queue)
        - History: Not cached (paginated from PostgreSQL)
      operationId: getMyMissions
      security:
        - BearerAuth: []
      parameters:
        - name: include_history
          in: query
          description: Include completed/cancelled missions history
          schema:
            type: boolean
            default: true
        - name: history_page
          in: query
          schema:
            type: integer
            default: 1
        - name: history_limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Volunteer's missions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyMissionsResponse'

  /missions/active:
    get:
      tags: [Missions]
      summary: Get active missions (cached)
      description: |
        Get all currently active missions. Useful for staff dashboard and monitoring.

        **Cache Strategy:**
        - Cached in Redis `mission:active:list:{filters_hash}` (TTL: 2 minutes)
        - Invalidated on mission status change
        - Returns `cached_at` timestamp for client-side cache management
      operationId: getActiveMissions
      security:
        - BearerAuth: []
      parameters:
        - name: mission_type
          in: query
          schema:
            $ref: '#/components/schemas/MissionType'
        - name: hub_id
          in: query
          schema:
            type: string
            format: uuid
        - name: include_stats
          in: query
          description: Include aggregated statistics
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Active missions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveMissionsResponse'

  /missions/stats:
    get:
      tags: [Missions]
      summary: Get mission statistics (cached)
      description: |
        Get aggregated mission statistics for reporting and analytics.

        **Cache Strategy:**
        - Cached in Redis `mission:stats:{hub_id|all}:{date_range}` (TTL: 5 minutes)
        - Heavy query - always use cache when possible
        - Returns `cached_at` timestamp
      operationId: getMissionStats
      security:
        - BearerAuth: []
      parameters:
        - name: hub_id
          in: query
          description: Filter by hub (optional)
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          description: Start date for statistics
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: End date for statistics
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Mission statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionStatsResponse'

  /missions/{id}/accept:
    post:
      tags: [Missions]
      summary: Accept dispatch request (volunteer)
      description: |
        Volunteer accepts a dispatch request for the mission.

        **Side Effects:**
        - Updates mission status to ASSIGNED
        - Updates dispatch_attempt response to ACCEPTED
        - Invalidates Redis cache for active missions
        - Triggers FCM notification to requester
        - Broadcasts via Supabase Realtime
      operationId: acceptMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptMissionRequest'
      responses:
        '200':
          description: Mission accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionDetailResponse'
        '400':
          description: Mission already assigned or dispatch expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflict - mission was assigned to another volunteer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/reject:
    post:
      tags: [Missions]
      summary: Reject dispatch request (volunteer)
      description: |
        Volunteer rejects a dispatch request.

        **Side Effects:**
        - Updates dispatch_attempt response to REJECTED
        - System will dispatch to next available volunteer
      operationId: rejectMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectMissionRequest'
      responses:
        '200':
          description: Mission rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid dispatch attempt or already responded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/assign:
    put:
      tags: [Missions]
      summary: Manually assign volunteer (Staff/Admin only)
      description: |
        Manually assign a volunteer to a mission without going through dispatch queue.

        **Side Effects:**
        - Updates mission status to ASSIGNED
        - Creates dispatch_attempt with type MANUAL
        - Invalidates Redis cache
        - Triggers FCM notification to volunteer and requester
      operationId: assignMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignMissionRequest'
      responses:
        '200':
          description: Mission assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionDetailResponse'
        '400':
          description: Mission already assigned or volunteer not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/start:
    post:
      tags: [Missions]
      summary: Start mission (volunteer on the way)
      description: |
        Volunteer indicates they have started the mission and are on their way.
        For DELIVERY missions, this means heading to the hub.
        For RESCUE missions, this means heading to the victim location.

        **Side Effects:**
        - Updates mission started_at timestamp
        - Broadcasts real-time location tracking
        - Updates Redis cache
      operationId: startMission
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartMissionRequest'
      responses:
        '200':
          description: Mission started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionDetailResponse'
        '400':
          description: Mission not in ASSIGNED status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /missions/{id}/dispatch-attempts:
    get:
      tags: [Missions]
      summary: Get dispatch attempt history
      description: |
        Get all dispatch attempts for a mission. Useful for debugging dispatch issues.

        **No Cache** - Audit trail data, always fetch from PostgreSQL
      operationId: getMissionDispatchAttempts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Dispatch attempts list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchAttemptsListResponse'
        '404':
          description: Mission not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ============================================================
  # VOLUNTEERS
  # ============================================================
