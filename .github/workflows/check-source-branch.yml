name: Git Flow Guard

on:
  pull_request:
    branches:
      - main

jobs:
  enforce-rules:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Verify the source branch is 'dev'
      - name: Verify Source Branch
        if: github.head_ref != 'dev'
        run: |
          echo "Error: Only the 'dev' branch can be merged into 'main'."
          echo "Source branch provided: ${{ github.head_ref }}"
          exit 1

      # Step 2: Verify the PR creator is the Repository Owner
      - name: Verify PR Creator is Owner
        if: github.event.pull_request.user.login != github.repository_owner
        run: |
          echo "Error: Access Denied."
          echo "Only the repository owner (${{ github.repository_owner }}) is authorized to create PRs to 'main'."
          echo "Current user: ${{ github.event.pull_request.user.login }}"
          exit 1

      - name: Success Message
        run: echo "Validation passed. Branch and Ownership verified."
