server:
  port: 8080

app:
  name: AidBridge

jwt:
  access-token:
    expiration-ms: 900000 # 15 minutes
  refresh-token:
    expiration-ms: 604800000 # 7 days

spring:
  application:
    name: spring-backend
  profiles:
    active: local

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      leak-detection-threshold: 2000
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  api-docs:
    path: /v3/api-docs

swagger-ui:
  path: /swagger-ui.html
  operationsSorter: method
  tagsSorter: alpha
