server:
  port: 8080

jwt:
  rsa:
    public-key: classpath:certs/public.pem
    private-key: classpath:certs/private.pem
  access-token:
    expiration-ms: 900000
  refresh-token:
    expiration-ms: 604800000

spring:
  application:
    name: spring-backend
  profiles:
    active: local

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  name: AidBridge

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  project-id: ${FIREBASE_PROJECT_ID:aidbridge-5613d}
  service-account:
    path: ${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
  api-key: ${CLOUDINARY_API_KEY:your-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}

springdoc:
  api-docs:
    path: /v3/api-docs
swagger-ui:
  path: /swagger-ui.html
  operationsSorter: method
  tagsSorter: alpha
