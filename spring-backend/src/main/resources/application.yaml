server:
  port: 8080

jwt:
  rsa:
    public-key: classpath:certs/public.pem
    private-key: classpath:certs/private.pem
  access-token:
    expiration-ms: 900000
  refresh-token:
    expiration-ms: 604800000

spring:
  application:
    name: spring-backend
  profiles:
    active: local

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
