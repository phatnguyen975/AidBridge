server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true


app:
  name: AidBridge
  routing:
    enabled: true
    osm-file: data/vietnam.osm.pbf
    graph-dir: ./graph-data
    data-access: MMAP # MMAP for low RAM, RAM_STORE for fast performance
    
    # Configure routing strategy profiles for different use cases
    profiles:
      urgent_response: routing-profiles/car-urgent_response.json
      disaster_safe: routing-profiles/car-disaster_safe.json
      heavy_aid: routing-profiles/car-heavy_aid.json
      community_delivery: routing-profiles/car-community_delivery.json
      offroad_terrain: routing-profiles/car-offroad_terrain.json

jwt:
  access-token:
    expiration-ms: 900000 # 15 minutes
  refresh-token:
    expiration-ms: 604800000 # 7 days

spring:
  application:
    name: spring-backend
  profiles:
    active: local

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 48
      minimum-idle: 10
      leak-detection-threshold: 20000
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  api-docs:
    path: /v3/api-docs

swagger-ui:
  path: /swagger-ui.html
  operationsSorter: method
  tagsSorter: alpha

logging:
  level:
    root: WARN
    com.drc.aidbridge: INFO

# ===========================
# GraphHopper Routing Engine
# ===========================
graphhopper:
  osm-file: data/vietnam.osm.pbf
  graph-dir: ./graph-data

  