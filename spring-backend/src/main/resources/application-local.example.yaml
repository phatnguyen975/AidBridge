spring:
  datasource:
    url: your_database_url
    username: your_database_username
    password: your_database_password

  data:
    redis:
      url: your_redis_url

  mail:
    username: your_email_username
    password: your_email_app_password

jwt:
  rsa:
    public-key: path_to_your_public_key
    private-key: path_to_your_private_key

firebase:
  enabled: false
  project-id: your_firebase_project_id
  service-account:
    path: path_to_your_firebase_service_account

cloudinary:
  cloud-name: your_cloud_name
  api-key: your_api_key
  api-secret: your_api_secret

openai:
  method: local
  model: whisper-1
  llm:
    mode: local
    remote-url: https://api.openai.com/v1/chat/completions
    remote-model: gpt-4o-mini
    local-cli:
      command: ollama
      model: llama3
      timeout-seconds: 120
  local-whisper:
    command: whisper
    model: small
    language: vi
