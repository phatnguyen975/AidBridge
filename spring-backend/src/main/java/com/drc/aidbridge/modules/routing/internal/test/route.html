<!doctype html>
<html><head><meta charset='utf-8'/><title>Route preview with dangerous zones</title>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.3/dist/leaflet.css'/>
<style>html,body,#map{height:100%;margin:0;padding:0} .info{background:rgba(255,255,255,0.9);padding:6px;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:12px} .legend{background:rgba(255,255,255,0.9);padding:8px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px} .legend-item{margin:4px 0} .legend-color{display:inline-block;width:16px;height:16px;margin-right:4px;border-radius:2px}</style>
</head><body>
<div id='map'></div>
<script src='https://unpkg.com/leaflet@1.9.3/dist/leaflet.js'></script>
<script>
  const pts = [[10.76709991349207,106.69486466817347],[10.7672243,106.6948362],[10.7678862,106.6954098],[10.7679661,106.695383],[10.7680851,106.695269],[10.7681562,106.6952579],[10.7684516,106.6950897],[10.769207,106.6946504],[10.7710229,106.6935644],[10.7711107,106.6934951],[10.7712084,106.6933707],[10.7712292,106.6934064],[10.771256,106.6934334],[10.771322,106.6934554],[10.7713831,106.6934406],[10.7714195,106.6934115],[10.7724371,106.6948699],[10.772787,106.6954284],[10.7736186,106.6944794],[10.7746878,106.6932328],[10.7758843,106.6917862],[10.7759826,106.6916588],[10.7790111,106.6883468],[10.7814155,106.6907327],[10.7831517,106.6888468],[10.7842139,106.6899324],[10.7848687,106.6892307],[10.7849642,106.6890619],[10.7850588,106.6891553],[10.7851938,106.6890134],[10.7854195,106.6887485],[10.786401,106.6876762],[10.7874184,106.6883239],[10.7882102,106.6887654],[10.7889095,106.6890781],[10.7895314,106.689376],[10.7898054,106.6895367],[10.7904368,106.6887356],[10.7907571,106.688343],[10.7909188,106.6881596],[10.7909329,106.6880863],[10.7910375,106.6879412],[10.791133,106.6878837],[10.791433,106.6874992],[10.7914723,106.6874025],[10.7916287,106.6872088],[10.7916957,106.6871727],[10.7920776,106.6866917],[10.7920861,106.6866872],[10.7922068,106.6866725],[10.7924447,106.6865338],[10.7926861,106.6867058],[10.792915,106.6867744],[10.7929452,106.6868862],[10.7931228,106.6872819],[10.7931702,106.6873607],[10.7928751,106.6876075],[10.792780832938108,106.6876774545127]];
  const zones = [{name:'1',priority:0.0,coords:[[10.8,106.7],[10.8,106.71],[10.81,106.75],[10.81,106.65],[10.8,106.7]]},{name:'2',priority:0.0,coords:[[10.9,106.72],[10.9,107.0],[10.81,107.0],[10.81,106.8],[10.9,106.72]]}];
  var allPts = pts.slice();
  function addIfValid(lat,lon){ if(!isNaN(lat) && !isNaN(lon)) allPts.push([lat,lon]); }
  addIfValid(10.7671033,106.69488);
  addIfValid(10.792787781621271,106.68768715847165);
  const map = L.map('map');
  if (allPts.length > 0) { map.fitBounds(allPts, {padding:[20,20]}); } else { map.setView([0,0],2); }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  zones.forEach((zone, idx) => {
    const color = zone.priority === 0 ? '#FF0000' : '#FFA500';
    const polygon = L.polygon(zone.coords, {
      color: color, weight: 2, opacity: 0.8, fillOpacity: 0.3, fillColor: color
    }).addTo(map);
    polygon.bindPopup(`<strong>🚨 ${zone.name}</strong><br/>Priority: ${zone.priority}`).openPopup();
  });
  if (pts.length > 0) {
    const poly = L.polyline(pts, {color:'deepskyblue', weight:5, opacity:0.95}).addTo(map);
    const routeStart = pts[0]; const routeEnd = pts[pts.length-1];
    L.circleMarker(routeStart, {radius:7, color:'white', weight:2, fillColor:'green', fillOpacity:1}).addTo(map).bindPopup('Snapped start');
    L.circleMarker(routeEnd, {radius:7, color:'white', weight:2, fillColor:'red', fillOpacity:1}).addTo(map).bindPopup('Snapped end');
  }
  if(!isNaN(10.7671033) && !isNaN(106.69488)) {
    L.circleMarker([10.7671033,106.69488], {radius:6, color:'#000', weight:1, fillColor:'blue', fillOpacity:0.9}).addTo(map).bindPopup('Requested start');
  }
  if(!isNaN(10.792787781621271) && !isNaN(106.68768715847165)) {
    L.circleMarker([10.792787781621271,106.68768715847165], {radius:6, color:'#000', weight:1, fillColor:'orange', fillOpacity:0.9}).addTo(map).bindPopup('Requested end');
  }
  const info = L.control({position:'topright'});
  info.onAdd = function() {
    const div = L.DomUtil.create('div','info');
    div.innerHTML = '<strong>Route Preview</strong><br/>Points: ' + pts.length + '<br/>Zones: ' + zones.length;
    return div;
  };
  info.addTo(map);
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<strong>Legend</strong><br/>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FF0000"></span>Bypass (priority 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FFA500"></span>Reduce (priority > 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:deepskyblue"></span>Route path</div>';
    return div;
  };
  legend.addTo(map);
</script>
</body></html>
