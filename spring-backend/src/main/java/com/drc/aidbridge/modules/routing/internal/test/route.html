<!doctype html>
<html><head><meta charset='utf-8'/><title>Route preview with dangerous zones</title>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.3/dist/leaflet.css'/>
<style>html,body,#map{height:100%;margin:0;padding:0} .info{background:rgba(255,255,255,0.9);padding:6px;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:12px} .legend{background:rgba(255,255,255,0.9);padding:8px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px} .legend-item{margin:4px 0} .legend-color{display:inline-block;width:16px;height:16px;margin-right:4px;border-radius:2px}</style>
</head><body>
<div id='map'></div>
<script src='https://unpkg.com/leaflet@1.9.3/dist/leaflet.js'></script>
<script>
  const pts = [[10.811646206987836,106.69974571479067],[10.8115446,106.6997556],[10.8114318,106.6997426],[10.8116074,106.6984444],[10.811631,106.6975895],[10.8114907,106.697425],[10.8113607,106.6972383],[10.8113567,106.696815],[10.8113412,106.6966309],[10.811307,106.6955479],[10.8112469,106.6954833],[10.8114427,106.6953138],[10.8115284,106.69526],[10.811611,106.6952137],[10.8117561,106.6951663],[10.8121586,106.6952304],[10.8126541,106.6952555],[10.813982,106.69525],[10.8150415,106.6952053],[10.8155047,106.6952232],[10.8156651,106.6952417],[10.8157747,106.6952334],[10.8160722,106.695193],[10.8163382,106.6952139],[10.8171641,106.6953376],[10.81735,106.6953361],[10.8176186,106.6952725],[10.8178725,106.6951813],[10.8182886,106.694978],[10.8185056,106.6948487],[10.8187216,106.6947663],[10.820094,106.6943009],[10.820176,106.6943031],[10.820293,106.694264],[10.8215358,106.6936813],[10.8216295,106.6936487],[10.8221751,106.6935168],[10.8226827,106.6956594],[10.8241957,106.6950325],[10.824435,106.6948407],[10.8248359,106.6944434],[10.8250381,106.6941881],[10.8256083,106.6934038],[10.8260732,106.6926948],[10.8275065,106.6906527],[10.827952,106.6901326],[10.8282604,106.689833],[10.8296274,106.6886063],[10.8303462,106.6879773],[10.830912,106.6873886],[10.8330908,106.6851691],[10.8331874,106.6850748],[10.8333085,106.6849705],[10.8334787,106.6848449],[10.8337291,106.6846941],[10.8345627,106.6842672],[10.8346614,106.684225],[10.8366589,106.6831938],[10.8368521,106.683102],[10.8371704,106.6829615],[10.8396829,106.6819837],[10.8396137,106.681838],[10.8394304,106.6815553],[10.8387986,106.6805226],[10.8385955,106.6801588],[10.8385342,106.680097],[10.8384914,106.6799748],[10.8385704,106.6720426],[10.8371179,106.6720453],[10.837107383858006,106.67296726179073]];
  const zones = [];
  var allPts = pts.slice();
  function addIfValid(lat,lon){ if(!isNaN(lat) && !isNaN(lon)) allPts.push([lat,lon]); }
  addIfValid(10.811650531953731,106.69979179105229);
  addIfValid(10.837117032862423,106.67296732749395);
  const map = L.map('map');
  if (allPts.length > 0) { map.fitBounds(allPts, {padding:[20,20]}); } else { map.setView([0,0],2); }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  zones.forEach((zone, idx) => {
    const color = zone.priority === 0 ? '#FF0000' : '#FFA500';
    const polygon = L.polygon(zone.coords, {
      color: color, weight: 2, opacity: 0.8, fillOpacity: 0.3, fillColor: color
    }).addTo(map);
    polygon.bindPopup(`<strong>🚨 ${zone.name}</strong><br/>Priority: ${zone.priority}`).openPopup();
  });
  if (pts.length > 0) {
    const poly = L.polyline(pts, {color:'deepskyblue', weight:5, opacity:0.95}).addTo(map);
    const routeStart = pts[0]; const routeEnd = pts[pts.length-1];
    L.circleMarker(routeStart, {radius:7, color:'white', weight:2, fillColor:'green', fillOpacity:1}).addTo(map).bindPopup('Snapped start');
    L.circleMarker(routeEnd, {radius:7, color:'white', weight:2, fillColor:'red', fillOpacity:1}).addTo(map).bindPopup('Snapped end');
  }
  if(!isNaN(10.811650531953731) && !isNaN(106.69979179105229)) {
    L.circleMarker([10.811650531953731,106.69979179105229], {radius:6, color:'#000', weight:1, fillColor:'blue', fillOpacity:0.9}).addTo(map).bindPopup('Requested start');
  }
  if(!isNaN(10.837117032862423) && !isNaN(106.67296732749395)) {
    L.circleMarker([10.837117032862423,106.67296732749395], {radius:6, color:'#000', weight:1, fillColor:'orange', fillOpacity:0.9}).addTo(map).bindPopup('Requested end');
  }
  const info = L.control({position:'topright'});
  info.onAdd = function() {
    const div = L.DomUtil.create('div','info');
    div.innerHTML = '<strong>Route Preview</strong><br/>Points: ' + pts.length + '<br/>Zones: ' + zones.length;
    return div;
  };
  info.addTo(map);
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<strong>Legend</strong><br/>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FF0000"></span>Bypass (priority 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FFA500"></span>Reduce (priority > 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:deepskyblue"></span>Route path</div>';
    return div;
  };
  legend.addTo(map);
</script>
</body></html>
