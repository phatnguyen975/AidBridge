<!doctype html>
<html><head><meta charset='utf-8'/><title>Route preview with dangerous zones</title>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.3/dist/leaflet.css'/>
<style>html,body,#map{height:100%;margin:0;padding:0} .info{background:rgba(255,255,255,0.9);padding:6px;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:12px} .legend{background:rgba(255,255,255,0.9);padding:8px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px} .legend-item{margin:4px 0} .legend-color{display:inline-block;width:16px;height:16px;margin-right:4px;border-radius:2px}</style>
</head><body>
<div id='map'></div>
<script src='https://unpkg.com/leaflet@1.9.3/dist/leaflet.js'></script>
<script>
  const pts = [[10.76709991349207,106.69486466817347],[10.7672243,106.6948362],[10.7644396,106.6924232],[10.7641303,106.6921462],[10.7639565,106.6920027],[10.7628385,106.6910151],[10.7621922,106.690455],[10.761538,106.6898707],[10.7613382,106.6902142],[10.7609397,106.6908479],[10.7607044,106.691245],[10.7605993,106.6914048],[10.7604564,106.6915408],[10.7603133,106.6916479],[10.760103,106.6917709],[10.7595699,106.6920439],[10.7589657,106.692316],[10.7589041,106.6923226],[10.7588519,106.6923653],[10.758645,106.6924512],[10.7580209,106.6915968],[10.7577834,106.6912915],[10.7568223,106.6901011],[10.7563199,106.6895119],[10.7555782,106.6887081],[10.7553773,106.6885142],[10.7552289,106.6884518],[10.7549906,106.6882142],[10.7545518,106.6878026],[10.7541657,106.6874168],[10.7537601,106.6869944],[10.7536889,106.686945],[10.753645,106.6869318],[10.7532768,106.6870501],[10.7527059,106.6872082],[10.7490591,106.6883582],[10.7480294,106.6887002],[10.7470325,106.6890085],[10.7470135,106.6889231],[10.7466595,106.6890184],[10.746385,106.6891068],[10.7459535,106.6892281],[10.7457545,106.6892959],[10.7455474,106.6893352],[10.7451303,106.689207],[10.7446819,106.6890551],[10.7440205,106.6888435],[10.7428176,106.6884294],[10.7427074,106.6883829],[10.74249,106.6883191],[10.7423339,106.6882834],[10.742116,106.6882631],[10.7419079,106.6882703],[10.7417842,106.6882916],[10.7416849,106.6883228],[10.7401227,106.6890667],[10.7397462,106.6892114],[10.7391969,106.6893717],[10.7390868,106.6893853],[10.738956,106.6893672],[10.7389066,106.6893428],[10.7388523,106.6893345],[10.7387997,106.6893425],[10.7387529,106.6893648],[10.7387194,106.6893934],[10.7386937,106.6894294],[10.7386246,106.6894597],[10.7384965,106.6894852],[10.7376259,106.6894801],[10.7357728,106.6894218],[10.7340165,106.6893816],[10.7335758,106.6893647],[10.7318586,106.6893346],[10.7303706,106.6892934],[10.7301765,106.6892214],[10.7299861,106.6890926],[10.7292273,106.6883748],[10.7285159,106.6877293],[10.7284704,106.6848997],[10.7284546,106.6823744],[10.7284206,106.6798044],[10.7283586,106.6773776],[10.7287868,106.6770597],[10.7291312,106.6768182],[10.72926077362931,106.67709123518092]];
  const zones = [];
  var allPts = pts.slice();
  function addIfValid(lat,lon){ if(!isNaN(lat) && !isNaN(lon)) allPts.push([lat,lon]); }
  addIfValid(10.7671033,106.69488);
  addIfValid(10.7294239,106.6770111);
  const map = L.map('map');
  if (allPts.length > 0) { map.fitBounds(allPts, {padding:[20,20]}); } else { map.setView([0,0],2); }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  zones.forEach((zone, idx) => {
    const color = zone.priority === 0 ? '#FF0000' : '#FFA500';
    const polygon = L.polygon(zone.coords, {
      color: color, weight: 2, opacity: 0.8, fillOpacity: 0.3, fillColor: color
    }).addTo(map);
    polygon.bindPopup(`<strong>🚨 ${zone.name}</strong><br/>Priority: ${zone.priority}`).openPopup();
  });
  if (pts.length > 0) {
    const poly = L.polyline(pts, {color:'deepskyblue', weight:5, opacity:0.95}).addTo(map);
    const routeStart = pts[0]; const routeEnd = pts[pts.length-1];
    L.circleMarker(routeStart, {radius:7, color:'white', weight:2, fillColor:'green', fillOpacity:1}).addTo(map).bindPopup('Snapped start');
    L.circleMarker(routeEnd, {radius:7, color:'white', weight:2, fillColor:'red', fillOpacity:1}).addTo(map).bindPopup('Snapped end');
  }
  if(!isNaN(10.7671033) && !isNaN(106.69488)) {
    L.circleMarker([10.7671033,106.69488], {radius:6, color:'#000', weight:1, fillColor:'blue', fillOpacity:0.9}).addTo(map).bindPopup('Requested start');
  }
  if(!isNaN(10.7294239) && !isNaN(106.6770111)) {
    L.circleMarker([10.7294239,106.6770111], {radius:6, color:'#000', weight:1, fillColor:'orange', fillOpacity:0.9}).addTo(map).bindPopup('Requested end');
  }
  const info = L.control({position:'topright'});
  info.onAdd = function() {
    const div = L.DomUtil.create('div','info');
    div.innerHTML = '<strong>Route Preview</strong><br/>Points: ' + pts.length + '<br/>Zones: ' + zones.length;
    return div;
  };
  info.addTo(map);
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<strong>Legend</strong><br/>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FF0000"></span>Bypass (priority 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FFA500"></span>Reduce (priority > 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:deepskyblue"></span>Route path</div>';
    return div;
  };
  legend.addTo(map);
</script>
</body></html>
