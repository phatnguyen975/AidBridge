<!doctype html>
<html><head><meta charset='utf-8'/><title>Route preview with dangerous zones</title>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.3/dist/leaflet.css'/>
<style>html,body,#map{height:100%;margin:0;padding:0} .info{background:rgba(255,255,255,0.9);padding:6px;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:12px} .legend{background:rgba(255,255,255,0.9);padding:8px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px} .legend-item{margin:4px 0} .legend-color{display:inline-block;width:16px;height:16px;margin-right:4px;border-radius:2px}</style>
</head><body>
<div id='map'></div>
<script src='https://unpkg.com/leaflet@1.9.3/dist/leaflet.js'></script>
<script>
  const pts = [[10.76709991349207,106.69486466817347],[10.7672243,106.6948362],[10.7682755,106.6957498],[10.7691375,106.6965106],[10.7700986,106.6973861],[10.7701463,106.6974117],[10.7702587,106.6974547],[10.7710642,106.698192],[10.7713293,106.6984348],[10.7713772,106.6983664],[10.7717669,106.6986802],[10.7718471,106.6987316],[10.7720934,106.6988525],[10.7721665,106.6989052],[10.775299,106.701861],[10.7754753,106.7018715],[10.7762943,106.7009788],[10.7772405,106.7018045],[10.7789593,106.6999459],[10.7801873,106.7010602],[10.7814769,106.7014332],[10.7826605,106.7017473],[10.78457,106.6996774],[10.7855174,106.6986683],[10.785845,106.6983368],[10.7859352,106.6982234],[10.7864515,106.6976719],[10.7883778,106.6955568],[10.7903735,106.6975106],[10.7907304,106.697112],[10.7909832,106.697081],[10.7911505,106.697075],[10.794098,106.6976305],[10.7944901,106.6977368],[10.7950505,106.6979491],[10.7957507,106.6982258],[10.7972682,106.6986875],[10.7981166,106.6990492],[10.7991158,106.6994039],[10.799606,106.6995564],[10.8009689,106.6992288],[10.8018645,106.6989173],[10.80247,106.6987292],[10.8025884,106.6986829],[10.8026325,106.6986377],[10.8027408,106.6985719],[10.8030848,106.6984716],[10.803151,106.6984131],[10.8040213,106.6982434],[10.8047088,106.6980763],[10.8051035,106.6979322],[10.8052561,106.6978738],[10.8058787,106.6973621],[10.8062957,106.6970763],[10.8064371,106.6973254],[10.8066647,106.6976727],[10.8067219,106.6977246],[10.8067748,106.69774],[10.8068331,106.6977391],[10.8070002,106.6977068],[10.807187,106.6976161],[10.8080156,106.6970912],[10.8091257,106.6965735],[10.8098977,106.6962376],[10.8097933,106.695992],[10.8098231,106.695978],[10.8097566,106.6958239],[10.8096522,106.6957134],[10.8096422,106.6956931],[10.8095531,106.6957381],[10.809541507510648,106.69571281683316]];
  const zones = [];
  var allPts = pts.slice();
  function addIfValid(lat,lon){ if(!isNaN(lat) && !isNaN(lon)) allPts.push([lat,lon]); }
  addIfValid(10.7671033,106.69488);
  addIfValid(10.809448715578583,106.69575691352537);
  const map = L.map('map');
  if (allPts.length > 0) { map.fitBounds(allPts, {padding:[20,20]}); } else { map.setView([0,0],2); }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  zones.forEach((zone, idx) => {
    const color = zone.priority === 0 ? '#FF0000' : '#FFA500';
    const polygon = L.polygon(zone.coords, {
      color: color, weight: 2, opacity: 0.8, fillOpacity: 0.3, fillColor: color
    }).addTo(map);
    polygon.bindPopup(`<strong>🚨 ${zone.name}</strong><br/>Priority: ${zone.priority}`).openPopup();
  });
  if (pts.length > 0) {
    const poly = L.polyline(pts, {color:'deepskyblue', weight:5, opacity:0.95}).addTo(map);
    const routeStart = pts[0]; const routeEnd = pts[pts.length-1];
    L.circleMarker(routeStart, {radius:7, color:'white', weight:2, fillColor:'green', fillOpacity:1}).addTo(map).bindPopup('Snapped start');
    L.circleMarker(routeEnd, {radius:7, color:'white', weight:2, fillColor:'red', fillOpacity:1}).addTo(map).bindPopup('Snapped end');
  }
  if(!isNaN(10.75481340982337) && !isNaN(106.67963328287738)) {
    L.circleMarker([10.75481340982337,106.67963328287738], {radius:6, color:'#000', weight:1, fillColor:'blue', fillOpacity:0.9}).addTo(map).bindPopup('Requested start');
  }
  if(!isNaN(10.809448715578583) && !isNaN(106.69575691352537)) {
    L.circleMarker([10.809448715578583,106.69575691352537], {radius:6, color:'#000', weight:1, fillColor:'orange', fillOpacity:0.9}).addTo(map).bindPopup('Requested end');
  }
  const info = L.control({position:'topright'});
  info.onAdd = function() {
    const div = L.DomUtil.create('div','info');
    div.innerHTML = '<strong>Route Preview</strong><br/>Points: ' + pts.length + '<br/>Zones: ' + zones.length;
    return div;
  };
  info.addTo(map);
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<strong>Legend</strong><br/>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FF0000"></span>Bypass (priority 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FFA500"></span>Reduce (priority > 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:deepskyblue"></span>Route path</div>';
    return div;
  };
  legend.addTo(map);
</script>
</body></html>
