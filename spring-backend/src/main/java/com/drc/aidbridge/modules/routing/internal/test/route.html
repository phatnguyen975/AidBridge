<!doctype html>
<html><head><meta charset='utf-8'/><title>Route preview with dangerous zones</title>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.3/dist/leaflet.css'/>
<style>html,body,#map{height:100%;margin:0;padding:0} .info{background:rgba(255,255,255,0.9);padding:6px;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:12px} .legend{background:rgba(255,255,255,0.9);padding:8px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px} .legend-item{margin:4px 0} .legend-color{display:inline-block;width:16px;height:16px;margin-right:4px;border-radius:2px}</style>
</head><body>
<div id='map'></div>
<script src='https://unpkg.com/leaflet@1.9.3/dist/leaflet.js'></script>
<script>
  const pts = [[10.76709991349207,106.69486466817347],[10.7672243,106.6948362],[10.7648658,106.6927925],[10.7648243,106.6924284],[10.7646584,106.6919853],[10.7645988,106.6919376],[10.7642962,106.6910963],[10.7643028,106.691016],[10.7642203,106.6907978],[10.7642576,106.6907818],[10.7642799,106.690748],[10.7642837,106.6907199],[10.7644741,106.6906931],[10.7646762,106.6905932],[10.7652725,106.6901467],[10.76557,106.689942],[10.7661437,106.6895198],[10.7661645,106.689493],[10.7662238,106.689373],[10.766677,106.6883633],[10.7666537,106.6883472],[10.7666367,106.6883243],[10.766628,106.688297],[10.7666284,106.6882684],[10.7666379,106.6882413],[10.7666554,106.6882189],[10.7666794,106.6882034],[10.7667332,106.6881989],[10.7667813,106.6880672],[10.7671666,106.6871336],[10.7673695,106.6867135],[10.7674396,106.6866673],[10.7678484,106.6857903],[10.7678492,106.6856693],[10.7679292,106.6855017],[10.7672716,106.6844625],[10.7669498,106.6839935],[10.7655926,106.6818746],[10.7656282,106.6818363],[10.7656557,106.6817916],[10.7656748,106.6817391],[10.7656828,106.6816837],[10.7656792,106.6816278],[10.7656642,106.681574],[10.7656385,106.6815245],[10.7656032,106.6814815],[10.7655599,106.681447],[10.7662045,106.679338],[10.7664056,106.6787221],[10.7664332,106.6785977],[10.7667969,106.6774399],[10.766714,106.677411],[10.7675732,106.6746008],[10.7674993,106.6745435],[10.7674725,106.6745071],[10.7674525,106.674463],[10.7674402,106.67441],[10.7674392,106.6743618],[10.7674473,106.6743144],[10.7674644,106.6742695],[10.7674,106.6742116],[10.7673665,106.6741461],[10.7670826,106.6739388],[10.7671334,106.6738237],[10.7671327,106.673773],[10.7668321,106.6724586],[10.7667446,106.6721331],[10.7666099,106.671509],[10.7663523,106.6704069],[10.7661923,106.669791],[10.7658133,106.6681645],[10.7655997,106.6672041],[10.7648374,106.6639556],[10.7646623,106.6631338],[10.7643678,106.6616067],[10.7646279,106.661554],[10.7646732,106.6614341],[10.7640794,106.6603177],[10.7622657,106.6569888],[10.7621436,106.6567534],[10.7624073,106.6546391],[10.7624131,106.6545185],[10.7625472,106.6533549],[10.7627791,106.6512184],[10.7629598,106.6512481],[10.7629341,106.6514817],[10.763133280704581,106.6515238702549]];
  const zones = [];
  var allPts = pts.slice();
  function addIfValid(lat,lon){ if(!isNaN(lat) && !isNaN(lon)) allPts.push([lat,lon]); }
  addIfValid(10.7671033,106.69488);
  addIfValid(10.763133439170602,106.65152270063817);
  const map = L.map('map');
  if (allPts.length > 0) { map.fitBounds(allPts, {padding:[20,20]}); } else { map.setView([0,0],2); }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  zones.forEach((zone, idx) => {
    const color = zone.priority === 0 ? '#FF0000' : '#FFA500';
    const polygon = L.polygon(zone.coords, {
      color: color, weight: 2, opacity: 0.8, fillOpacity: 0.3, fillColor: color
    }).addTo(map);
    polygon.bindPopup(`<strong>🚨 ${zone.name}</strong><br/>Priority: ${zone.priority}`).openPopup();
  });
  if (pts.length > 0) {
    const poly = L.polyline(pts, {color:'deepskyblue', weight:5, opacity:0.95}).addTo(map);
    const routeStart = pts[0]; const routeEnd = pts[pts.length-1];
    L.circleMarker(routeStart, {radius:7, color:'white', weight:2, fillColor:'green', fillOpacity:1}).addTo(map).bindPopup('Snapped start');
    L.circleMarker(routeEnd, {radius:7, color:'white', weight:2, fillColor:'red', fillOpacity:1}).addTo(map).bindPopup('Snapped end');
  }
  if(!isNaN(10.7671033) && !isNaN(106.69488)) {
    L.circleMarker([10.7671033,106.69488], {radius:6, color:'#000', weight:1, fillColor:'blue', fillOpacity:0.9}).addTo(map).bindPopup('Requested start');
  }
  if(!isNaN(10.763133439170602) && !isNaN(106.65152270063817)) {
    L.circleMarker([10.763133439170602,106.65152270063817], {radius:6, color:'#000', weight:1, fillColor:'orange', fillOpacity:0.9}).addTo(map).bindPopup('Requested end');
  }
  const info = L.control({position:'topright'});
  info.onAdd = function() {
    const div = L.DomUtil.create('div','info');
    div.innerHTML = '<strong>Route Preview</strong><br/>Points: ' + pts.length + '<br/>Zones: ' + zones.length;
    return div;
  };
  info.addTo(map);
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<strong>Legend</strong><br/>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FF0000"></span>Bypass (priority 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FFA500"></span>Reduce (priority > 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:deepskyblue"></span>Route path</div>';
    return div;
  };
  legend.addTo(map);
</script>
</body></html>
