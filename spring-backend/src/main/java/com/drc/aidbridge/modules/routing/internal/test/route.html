<!doctype html>
<html><head><meta charset='utf-8'/><title>Route preview with dangerous zones</title>
<link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.3/dist/leaflet.css'/>
<style>html,body,#map{height:100%;margin:0;padding:0} .info{background:rgba(255,255,255,0.9);padding:6px;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:12px} .legend{background:rgba(255,255,255,0.9);padding:8px;border-radius:4px;font-family:Arial,sans-serif;font-size:11px} .legend-item{margin:4px 0} .legend-color{display:inline-block;width:16px;height:16px;margin-right:4px;border-radius:2px}</style>
</head><body>
<div id='map'></div>
<script src='https://unpkg.com/leaflet@1.9.3/dist/leaflet.js'></script>
<script>
  const pts = [[10.754766190727379,106.67893013024195],[10.7547713,106.6789487],[10.7571834,106.6781278],[10.7582403,106.6807594],[10.7583872,106.6807141],[10.7626244,106.6790625],[10.7631515,106.6795568],[10.7648551,106.6812194],[10.7651972,106.6815348],[10.7652273,106.6814939],[10.7652644,106.6814596],[10.7653073,106.6814331],[10.7654196,106.6814017],[10.7654865,106.681415],[10.7655599,106.681447],[10.7656032,106.6814815],[10.7656385,106.6815245],[10.7656642,106.681574],[10.7656792,106.6816278],[10.7656828,106.6816837],[10.7656748,106.6817391],[10.7656557,106.6817916],[10.7661031,106.682257],[10.7664075,106.6825614],[10.768177,106.6841871],[10.7683439,106.6839949],[10.7684647,106.6839333],[10.768784,106.6835914],[10.7690486,106.6832774],[10.7693431,106.6835636],[10.769713,106.6839014],[10.7703109,106.6844931],[10.7711206,106.6852373],[10.7715689,106.6856697],[10.7716216,106.6856276],[10.7717482,106.6855545],[10.77275235003769,106.68490510537069]];
  const zones = [{name:'be8eb951-322b-46af-aabb-940d47797702',priority:0.0,coords:[[10.7626,106.6601],[10.7726,106.6601],[10.7726,106.6701],[10.76392891545585,106.67234734482815],[10.757310649669662,106.66942035367771],[10.755074099427063,106.6649137165096],[10.757082431016983,106.65641150412023],[10.7626,106.6601]]},{name:'6436ca79-e9a4-4caf-bc2f-c4244d75dd44',priority:0.0,coords:[[10.759036628822813,106.68182862856912],[10.735939419150526,106.6735737170647],[10.724176711720276,106.69124212414437],[10.732287337200603,106.70504858432139],[10.750357597165674,106.72204115069303],[10.759036628822813,106.68182862856912]]},{name:'ec486a6d-4cc1-452c-a81d-a57c23d785b1',priority:0.0,coords:[[10.794698658991848,106.64378845157796],[10.786589712201263,106.63254053122392],[10.810157214378847,106.62158225688762],[10.807359559355106,106.64393327458674],[10.815467945376184,106.66681530998505],[10.80128998084298,106.67791840733014],[10.794698658991848,106.64378845157796]]},{name:'cbaff78a-8ddc-469f-a32e-6cc76285b8b7',priority:0.0,coords:[[10.788677453187006,106.68133596236453],[10.78566806995289,106.69104955641075],[10.788677453187006,106.70905706537326],[10.774878082600821,106.70464858807537],[10.770620702268317,106.68918155755568],[10.805045034365008,106.69702715274678],[10.788677453187006,106.68133596236453]]}];
  var allPts = pts.slice();
  function addIfValid(lat,lon){ if(!isNaN(lat) && !isNaN(lon)) allPts.push([lat,lon]); }
  addIfValid(10.7547677,106.6789297);
  addIfValid(10.772767700000001,106.6849297);
  const map = L.map('map');
  if (allPts.length > 0) { map.fitBounds(allPts, {padding:[20,20]}); } else { map.setView([0,0],2); }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  zones.forEach((zone, idx) => {
    const color = zone.priority === 0 ? '#FF0000' : '#FFA500';
    const polygon = L.polygon(zone.coords, {
      color: color, weight: 2, opacity: 0.8, fillOpacity: 0.3, fillColor: color
    }).addTo(map);
    polygon.bindPopup(`<strong>🚨 ${zone.name}</strong><br/>Priority: ${zone.priority}`).openPopup();
  });
  if (pts.length > 0) {
    const poly = L.polyline(pts, {color:'deepskyblue', weight:5, opacity:0.95}).addTo(map);
    const routeStart = pts[0]; const routeEnd = pts[pts.length-1];
    L.circleMarker(routeStart, {radius:7, color:'white', weight:2, fillColor:'green', fillOpacity:1}).addTo(map).bindPopup('Snapped start');
    L.circleMarker(routeEnd, {radius:7, color:'white', weight:2, fillColor:'red', fillOpacity:1}).addTo(map).bindPopup('Snapped end');
  }
  if(!isNaN(10.7547677) && !isNaN(106.6789297)) {
    L.circleMarker([10.7547677,106.6789297], {radius:6, color:'#000', weight:1, fillColor:'blue', fillOpacity:0.9}).addTo(map).bindPopup('Requested start');
  }
  if(!isNaN(10.772767700000001) && !isNaN(106.6849297)) {
    L.circleMarker([10.772767700000001,106.6849297], {radius:6, color:'#000', weight:1, fillColor:'orange', fillOpacity:0.9}).addTo(map).bindPopup('Requested end');
  }
  const info = L.control({position:'topright'});
  info.onAdd = function() {
    const div = L.DomUtil.create('div','info');
    div.innerHTML = '<strong>Route Preview</strong><br/>Points: ' + pts.length + '<br/>Zones: ' + zones.length;
    return div;
  };
  info.addTo(map);
  const legend = L.control({position:'bottomright'});
  legend.onAdd = function() {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = '<strong>Legend</strong><br/>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FF0000"></span>Bypass (priority 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:#FFA500"></span>Reduce (priority > 0)</div>';
    div.innerHTML += '<div class="legend-item"><span class="legend-color" style="background:deepskyblue"></span>Route path</div>';
    return div;
  };
  legend.addTo(map);
</script>
</body></html>
